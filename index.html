<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Love</title>

<style>

body{
background:#f3f8ff;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
font-family:Arial;
overflow:hidden;
}

/* bouquet container */

.bouquet{
position:relative;
width:300px;
height:300px;
}

/* flowers */

.flower{
position:absolute;
width:40px;
height:40px;
border-radius:50%;
}

/* blue shades */

.f1{
top:40px;
left:130px;
background:#1e3a8a;
box-shadow:-20px 0 #1e3a8a,20px 0 #1e3a8a,0 -20px #1e3a8a,0 20px #1e3a8a;
}

.f2{
top:70px;
left:90px;
background:#2563eb;
box-shadow:-20px 0 #2563eb,20px 0 #2563eb,0 -20px #2563eb,0 20px #2563eb;
}

.f3{
top:70px;
left:170px;
background:#3b82f6;
box-shadow:-20px 0 #3b82f6,20px 0 #3b82f6,0 -20px #3b82f6,0 20px #3b82f6;
}

.f4{
top:110px;
left:60px;
background:#60a5fa;
box-shadow:-20px 0 #60a5fa,20px 0 #60a5fa,0 -20px #60a5fa,0 20px #60a5fa;
}

.f5{
top:110px;
left:200px;
background:#93c5fd;
box-shadow:-20px 0 #93c5fd,20px 0 #93c5fd,0 -20px #93c5fd,0 20px #93c5fd;
}

.f6{
top:150px;
left:130px;
background:#2563eb;
box-shadow:-20px 0 #2563eb,20px 0 #2563eb,0 -20px #2563eb,0 20px #2563eb;
}

/* bouquet wrap */

.wrap{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
width:220px;
height:160px;
background:#c49a6c;
clip-path:polygon(0% 0%,100% 0%,70% 100%,30% 100%);
z-index:-1;
}

/* message */

.message{
margin-top:40px;
text-align:center;
font-size:18px;
color:#1e3a8a;
max-width:420px;
}

/* floating hearts */

.heart{
position:absolute;
width:20px;
height:20px;
background:red;
transform:rotate(45deg);
animation:float 6s linear infinite;
}

.heart:before,
.heart:after{
content:"";
position:absolute;
width:20px;
height:20px;
background:red;
border-radius:50%;
}

.heart:before{
top:-10px;
left:0;
}

.heart:after{
left:-10px;
top:0;
}

@keyframes float{
0%{
transform:translateY(100vh) rotate(45deg);
opacity:1;
}
100%{
transform:translateY(-10vh) rotate(45deg);
opacity:0;
}
}

/* sparkle */

.sparkle{
position:absolute;
width:6px;
height:6px;
background:yellow;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
0%{opacity:0.2;transform:scale(1);}
100%{opacity:1;transform:scale(1.8);}
}

</style>
</head>

<body>

<div class="bouquet">

<div class="wrap"></div>

<div class="flower f1"></div>
<div class="flower f2"></div>
<div class="flower f3"></div>
<div class="flower f4"></div>
<div class="flower f5"></div>
<div class="flower f6"></div>

</div>

<div class="message">
Happy six months, cintaku. <br>
Half a year of us and I wouldnt trade it for anything.
</div>

<!-- hearts -->
<div class="heart" style="left:10%;animation-delay:0s"></div>
<div class="heart" style="left:30%;animation-delay:2s"></div>
<div class="heart" style="left:50%;animation-delay:4s"></div>
<div class="heart" style="left:70%;animation-delay:1s"></div>
<div class="heart" style="left:90%;animation-delay:3s"></div>

<!-- sparkles -->
<div class="sparkle" style="top:20%;left:25%"></div>
<div class="sparkle" style="top:30%;left:70%"></div>
<div class="sparkle" style="top:60%;left:40%"></div>
<div class="sparkle" style="top:50%;left:80%"></div>
<div class="sparkle" style="top:40%;left:15%"></div>

</body>
</html>
